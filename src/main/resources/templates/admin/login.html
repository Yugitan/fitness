<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Fitness后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card" style="width:100%;max-width:420px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock fs-1 text-orange"></i>
            <h4 class="fw-bold mt-2">管理员登录</h4>
            <p class="text-muted small">Fitness健身记录 - 后台管理</p>
        </div>

        <div id="loginError" class="alert alert-danger" style="display:none;"></div>

        <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" class="form-control" id="username" placeholder="请输入管理员账号" value="admin">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" id="password" placeholder="请输入密码" value="123456">
        </div>
        <button class="btn btn-primary w-100 btn-lg" onclick="doLogin()">
            <i class="bi bi-box-arrow-in-right"></i> 登录
        </button>

        <div class="text-center mt-3">
            <a th:href="@{/}" class="text-muted small"><i class="bi bi-arrow-left"></i> 返回前台</a>
        </div>
    </div>
</div>

<script th:src="@{/static/js/common.js}"></script>
<script>
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').textContent = '请输入用户名和密码';
            return;
        }

        const result = await API.post('/admin/login', { username, password });
        if (result.code === 200) {
            window.location.href = CTX + '/admin';
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').textContent = result.message || '登录失败';
        }
    }

    // 回车登录
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>

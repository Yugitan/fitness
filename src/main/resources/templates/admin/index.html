<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 56px); }
        .admin-main { flex: 1; padding: 1.5rem; background: var(--bg-primary); }
        .sidebar-link { display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-dark sticky-top" style="background:var(--bg-secondary);border-bottom:1px solid var(--border-color);">
    <div class="container-fluid px-3">
        <a class="navbar-brand" th:href="@{/admin}"><i class="bi bi-lightning-charge-fill text-orange"></i> Fitness管理后台</a>
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted small" th:text="'欢迎，' + ${loginUser?.nickname ?: '管理员'}">欢迎</span>
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> 前台</a>
            <button class="btn btn-outline-secondary btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</button>
        </div>
    </div>
</nav>

<div class="admin-layout">
    <!-- 侧边栏 -->
    <div class="admin-sidebar" style="width:220px;flex-shrink:0;">
        <nav class="nav flex-column">
            <a class="nav-link sidebar-link active" th:href="@{/admin}"><i class="bi bi-speedometer2"></i> 仪表盘</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/user/list}"><i class="bi bi-people"></i> 用户管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/exercise/list}"><i class="bi bi-book"></i> 动作库管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/plan/list}"><i class="bi bi-journal-text"></i> 计划管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/list}"><i class="bi bi-person-badge"></i> 博主管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/plan}"><i class="bi bi-camera-video"></i> 博主计划管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/config}"><i class="bi bi-gear"></i> 系统配置</a>
        </nav>
    </div>

    <!-- 主内容区 -->
    <div class="admin-main">
        <h4 class="fw-bold mb-4">仪表盘</h4>

        <!-- 统计卡片 -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">总用户数</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number">26</div>
                    <div class="stat-label">动作总数</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">训练记录</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">计划总数</div>
                </div>
            </div>
        </div>

        <!-- 快捷入口 -->
        <h5 class="fw-bold mb-3">快捷管理</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <a th:href="@{/admin/exercise/list}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-plus-circle fs-1 text-orange"></i>
                        <h6 class="mt-2">管理动作库</h6>
                        <small class="text-muted">新增/编辑/删除健身动作</small>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/blogger/list}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-person-plus fs-1 text-teal"></i>
                        <h6 class="mt-2">管理博主</h6>
                        <small class="text-muted">管理博主信息和训练计划</small>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/config}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-sliders fs-1 text-info"></i>
                        <h6 class="mt-2">系统配置</h6>
                        <small class="text-muted">修改网站基本配置信息</small>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/static/js/common.js}"></script>
<script>
    function logout() {
        API.post('/admin/logout').then(() => {
            window.location.href = CTX + '/admin/login/page';
        });
    }
</script>
</body>
</html>

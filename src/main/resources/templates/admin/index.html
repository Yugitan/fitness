<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{admin/common/fragments :: head('仪表盘')}"></th:block>
</head>
<body>

<th:block th:replace="~{admin/common/fragments :: navbar}"></th:block>

<div class="admin-layout">
    <th:block th:replace="~{admin/common/fragments :: sidebar('dashboard')}"></th:block>

    <div class="admin-main">
        <h4 class="fw-bold mb-4">仪表盘</h4>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="statUsers">-</div>
                    <div class="stat-label">总用户数</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number">26</div>
                    <div class="stat-label">动作总数</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="statRecords">-</div>
                    <div class="stat-label">训练记录</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card">
                    <div class="stat-number" id="statPlans">-</div>
                    <div class="stat-label">计划总数</div>
                </div>
            </div>
        </div>

        <h5 class="fw-bold mb-3">快捷管理</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <a th:href="@{/admin/user/list}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-people fs-1 text-orange"></i>
                        <h6 class="mt-2">用户管理</h6>
                        <small class="text-muted">管理用户、分配权限</small>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/exercise/list}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-plus-circle fs-1 text-orange"></i>
                        <h6 class="mt-2">管理动作库</h6>
                        <small class="text-muted">新增/编辑/删除健身动作</small>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/config}" class="text-decoration-none">
                    <div class="card p-3 text-center">
                        <i class="bi bi-sliders fs-1 text-info"></i>
                        <h6 class="mt-2">系统配置</h6>
                        <small class="text-muted">修改网站基本配置信息</small>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{admin/common/fragments :: scripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const users = await API.get('/admin/api/user/list');
            if (users.code === 200) document.getElementById('statUsers').textContent = (users.data||[]).length;
        } catch(e) {}
        try {
            const records = await API.get('/training/api/list');
            if (records.code === 200) document.getElementById('statRecords').textContent = (records.data||[]).length;
        } catch(e) {}
        try {
            const plans = await API.get('/plan/api/list');
            if (plans.code === 200) document.getElementById('statPlans').textContent = (plans.data||[]).length;
        } catch(e) {}
    });
</script>
</body>
</html>

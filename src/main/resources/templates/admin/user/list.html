<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - Fitness后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 56px); }
        .admin-main { flex: 1; padding: 1.5rem; background: var(--bg-primary); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top" style="background:var(--bg-secondary);border-bottom:1px solid var(--border-color);">
    <div class="container-fluid px-3">
        <a class="navbar-brand" th:href="@{/admin}"><i class="bi bi-lightning-charge-fill text-orange"></i> Fitness管理后台</a>
        <div class="d-flex gap-2">
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">前台</a>
            <button class="btn btn-outline-secondary btn-sm" onclick="logout()">退出</button>
        </div>
    </div>
</nav>

<div class="admin-layout">
    <div class="admin-sidebar" style="width:220px;flex-shrink:0;">
        <nav class="nav flex-column">
            <a class="nav-link sidebar-link" th:href="@{/admin}">仪表盘</a>
            <a class="nav-link sidebar-link active" th:href="@{/admin/user/list}">用户管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/exercise/list}">动作库管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/plan/list}">计划管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/list}">博主管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/plan}">博主计划管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/config}">系统配置</a>
        </nav>
    </div>

    <div class="admin-main">
        <h4 class="fw-bold mb-4">用户管理</h4>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" id="userTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>昵称</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" class="text-center text-muted py-4">用户管理功能已预留，登录后可查看用户列表</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/static/js/common.js}"></script>
<script>
    async function loadUsers() {
        const result = await API.get('/admin/api/user/list');
        if (result.code === 200 && result.data) {
            const tbody = document.querySelector('#userTable tbody');
            tbody.innerHTML = result.data.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.nickname || '-'}</td>
                    <td>${u.role === 0 ? '普通用户' : u.role === 1 ? '管理员' : '超级管理员'}</td>
                    <td>${u.status === 1 ? '<span class="badge bg-success">正常</span>' : '<span class="badge bg-danger">禁用</span>'}</td>
                    <td>${u.createTime || '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning" onclick="toggleStatus(${u.id}, ${u.status})">${u.status === 1 ? '禁用' : '启用'}</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
    }

    async function toggleStatus(id, currentStatus) {
        const newStatus = currentStatus === 1 ? 0 : 1;
        const result = await API.put(`/admin/api/user/${id}/status?status=${newStatus}`);
        if (result.code === 200) { Toast.success('操作成功'); loadUsers(); }
        else Toast.error(result.message);
    }

    async function deleteUser(id) {
        if (!confirm('确定删除该用户吗？')) return;
        const result = await API.delete('/admin/api/user/' + id);
        if (result.code === 200) { Toast.success('删除成功'); loadUsers(); }
        else Toast.error(result.message);
    }

    function logout() { API.post('/admin/logout').then(() => location.href = CTX + '/admin/login/page'); }

    loadUsers();
</script>
</body>
</html>

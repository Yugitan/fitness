<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - Fitness后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>.admin-layout{display:flex;min-height:calc(100vh - 56px)}.admin-main{flex:1;padding:1.5rem;background:var(--bg-primary)}</style>
</head>
<body>
<nav class="navbar navbar-dark sticky-top" style="background:var(--bg-secondary);border-bottom:1px solid var(--border-color);">
    <div class="container-fluid px-3">
        <a class="navbar-brand" th:href="@{/admin}"><i class="bi bi-lightning-charge-fill text-orange"></i> Fitness管理后台</a>
        <div class="d-flex gap-2">
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">前台</a>
            <button class="btn btn-outline-secondary btn-sm" onclick="logout()">退出</button>
        </div>
    </div>
</nav>
<div class="admin-layout">
    <div class="admin-sidebar" style="width:220px;flex-shrink:0;">
        <nav class="nav flex-column">
            <a class="nav-link sidebar-link" th:href="@{/admin}">仪表盘</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/user/list}">用户管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/exercise/list}">动作库管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/plan/list}">计划管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/list}">博主管理</a>
            <a class="nav-link sidebar-link" th:href="@{/admin/blogger/plan}">博主计划管理</a>
            <a class="nav-link sidebar-link active" th:href="@{/admin/config}">系统配置</a>
        </nav>
    </div>
    <div class="admin-main">
        <h4 class="fw-bold mb-4">系统配置</h4>
        <div class="card">
            <div class="card-body">
                <div id="configList"></div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/static/js/common.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', loadConfig);
    async function loadConfig() {
        const r = await API.get('/admin/api/config/list');
        if (r.code === 200) {
            document.getElementById('configList').innerHTML = (r.data||[]).map(c => `
                <div class="detail-row">
                    <div class="flex-grow-1">
                        <strong>${c.configKey}</strong>
                        <small class="text-muted ms-2">${c.configDesc||''}</small>
                    </div>
                    <div class="d-flex gap-2">
                        <input class="form-control form-control-sm" style="width:200px" value="${c.configValue||''}" id="cfg_${c.configKey}">
                        <button class="btn btn-primary btn-sm" onclick="saveConfig('${c.configKey}')">保存</button>
                    </div>
                </div>`).join('');
        }
    }
    async function saveConfig(key) {
        const val = document.getElementById('cfg_' + key).value;
        const r = await API.put(`/admin/api/config/update?key=${encodeURIComponent(key)}&value=${encodeURIComponent(val)}`);
        if (r.code === 200) Toast.success('保存成功'); else Toast.error(r.message);
    }
    function logout() { API.post('/admin/logout').then(()=>location.href = CTX + '/admin/login/page'); }
</script>
</body>
</html>

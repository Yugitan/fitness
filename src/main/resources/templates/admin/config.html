<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{admin/common/fragments :: head('系统配置')}"></th:block>
</head>
<body>

<th:block th:replace="~{admin/common/fragments :: navbar}"></th:block>

<div class="admin-layout">
    <th:block th:replace="~{admin/common/fragments :: sidebar('config')}"></th:block>

    <div class="admin-main">
        <h4 class="fw-bold mb-3">系统配置</h4>
        <div class="card">
            <div class="card-body">
                <div id="configList">
                    <p class="text-center text-muted py-4">加载中...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{admin/common/fragments :: scripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', loadConfig);

    async function loadConfig() {
        const result = await API.get('/admin/api/config/list');
        if (result.code === 200 && result.data) {
            document.getElementById('configList').innerHTML = result.data.map(c => `
                <div class="d-flex align-items-center mb-2 p-2 border-bottom">
                    <div style="width:160px;flex-shrink:0">
                        <strong>${c.configKey}</strong>
                        <br><small class="text-muted">${c.configDesc || ''}</small>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <input class="form-control form-control-sm" value="${c.configValue || ''}" id="cfg_${c.id}" data-id="${c.id}" data-key="${c.configKey}">
                    </div>
                    <div class="ms-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="saveConfig(${c.id})">保存</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function saveConfig(id) {
        const input = document.getElementById('cfg_' + id);
        const data = { id, configKey: input.dataset.key, configValue: input.value };
        const result = await API.put('/admin/api/config/update', data);
        if (result.code === 200) Toast.success('保存成功');
        else Toast.error(result.message);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<!--
    管理员后台公共 Fragment
    所有后台页面统一引用此文件，确保导航栏、侧边栏、布局全局一致
-->

<!-- ========== 公共 <head> 标签 ========== -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Fitness后台'">Fitness后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>
        .admin-layout { display: flex; min-height: calc(100vh - 56px); }
        .admin-main { flex: 1; padding: 1.5rem; background: var(--bg-base); }
        .sidebar-link { display: flex; align-items: center; gap: 0.5rem; }
    </style>
</th:block>

<!-- ========== 顶部导航栏 ========== -->
<th:block th:fragment="navbar">
    <nav class="navbar navbar-dark sticky-top navbar-admin">
        <div class="container-fluid px-3">
            <a class="navbar-brand" th:href="@{/admin}">
                <i class="bi bi-lightning-charge-fill text-orange"></i> Fitness管理后台
            </a>
            <div class="d-flex align-items-center gap-2">
                <span class="text-muted small" th:text="'欢迎，' + ${loginUser?.nickname ?: '管理员'}">欢迎</span>
                <a th:href="@{/}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> 前台</a>
                <button class="btn btn-outline-secondary btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>
</th:block>

<!-- ========== 侧边栏 ========== -->
<th:block th:fragment="sidebar(activeMenu)">
    <div class="admin-sidebar" style="width:220px;flex-shrink:0;">
        <nav class="nav flex-column">
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'dashboard'} ? 'active'"
               th:href="@{/admin}"><i class="bi bi-speedometer2"></i> 仪表盘</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'user'} ? 'active'"
               th:href="@{/admin/user/list}"><i class="bi bi-people"></i> 用户管理</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'exercise'} ? 'active'"
               th:href="@{/admin/exercise/list}"><i class="bi bi-book"></i> 动作库管理</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'plan'} ? 'active'"
               th:href="@{/admin/plan/list}"><i class="bi bi-journal-text"></i> 计划管理</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'blogger'} ? 'active'"
               th:href="@{/admin/blogger/list}"><i class="bi bi-person-badge"></i> 博主管理</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'bloggerPlan'} ? 'active'"
               th:href="@{/admin/blogger/plan}"><i class="bi bi-camera-video"></i> 博主计划管理</a>
            <a class="nav-link sidebar-link" th:classappend="${activeMenu == 'config'} ? 'active'"
               th:href="@{/admin/config}"><i class="bi bi-gear"></i> 系统配置</a>
        </nav>
    </div>
</th:block>

<!-- ========== 公共 JS（logout） ========== -->
<th:block th:fragment="scripts">
    <script th:src="@{/static/js/common.js}"></script>
    <script>
        function logout() {
            API.post('/admin/logout').then(() => location.href = CTX + '/admin/login/page');
        }
    </script>
</th:block>

<!-- ========== 完整布局模板 ========== -->
<th:block th:fragment="layout(title, activeMenu)">
    <th:block th:replace="~{admin/common/fragments :: head(${title})}"></th:block>
</head>
<body>

<th:block th:replace="~{admin/common/fragments :: navbar}"></th:block>

<div class="admin-layout">
    <th:block th:replace="~{admin/common/fragments :: sidebar(${activeMenu})}"></th:block>

    <div class="admin-main">
        <!-- 内容区由各页面填充 -->
        <th:block th:insert="${body} ?: _"></th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{admin/common/fragments :: scripts}"></th:block>
</body>
</html>

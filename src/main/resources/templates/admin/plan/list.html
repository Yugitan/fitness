<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{admin/common/fragments :: head('计划管理')}"></th:block>
</head>
<body>

<th:block th:replace="~{admin/common/fragments :: navbar}"></th:block>

<div class="admin-layout">
    <th:block th:replace="~{admin/common/fragments :: sidebar('plan')}"></th:block>

    <div class="admin-main">
        <h4 class="fw-bold mb-3">计划管理</h4>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table" id="planTable">
                        <thead>
                            <tr><th>ID</th><th>计划名称</th><th>分组</th><th>难度</th><th>操作</th></tr>
                        </thead>
                        <tbody id="planTbody">
                            <tr><td colspan="5" class="text-center text-muted py-4">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{admin/common/fragments :: scripts}"></th:block>
<script>
    document.addEventListener('DOMContentLoaded', loadPlans);

    async function loadPlans() {
        const result = await API.get('/plan/api/list');
        if (result.code === 200) {
            const data = result.data || [];
            document.getElementById('planTbody').innerHTML = data.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.title || '未命名'}</td>
                    <td>${p.groupName || '-'}</td>
                    <td>${p.difficulty === 1 ? '初级' : p.difficulty === 2 ? '中级' : p.difficulty === 3 ? '高级' : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="delistPlan(${p.id})">下架</button>
                    </td>
                </tr>
            `).join('');
        }
    }

    async function delistPlan(id) {
        if (!confirm('确定下架该计划？')) return;
        const result = await API.delete('/admin/api/plan/' + id);
        if (result.code === 200) { Toast.success('已下架'); loadPlans(); }
        else Toast.error(result.message);
    }
</script>
</body>
</html>

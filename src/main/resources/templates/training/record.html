<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练记录 - Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-lightning-charge-fill"></i>Fitness</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">首页</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/exercise}">动作库</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/training}">训练记录</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/plan}">训练计划</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/blogger/list}">博主专区</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/statistics}">数据统计</a></li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-person-circle"></i> 登录/注册</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold mb-0">训练记录</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#recordModal" onclick="openCreateModal()" id="btnNewRecord">
            <i class="bi bi-plus-lg"></i> 新增训练记录
        </button>
    </div>

    <div class="row g-2 mb-3">
        <div class="col-auto">
            <input type="date" class="form-control" id="startDate" onchange="loadRecords()">
        </div>
        <div class="col-auto"><span class="text-muted align-middle">至</span></div>
        <div class="col-auto">
            <input type="date" class="form-control" id="endDate" onchange="loadRecords()">
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-secondary" onclick="clearFilter()">清除筛选</button>
        </div>
    </div>

    <div id="recordList"></div>
    <div id="emptyState" class="card text-center p-5" style="display:none">
        <i class="bi bi-clipboard2 fs-1 text-muted"></i>
        <h5 class="mt-2">暂无训练记录</h5>
        <p class="text-muted">点击"新增训练记录"开始记录你的训练吧！</p>
    </div>
</div>

<!-- 新增/编辑记录弹窗 -->
<div class="modal fade" id="recordModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modalTitle">新增训练记录</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="recordId">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">训练日期</label>
                        <input type="date" class="form-control" id="trainDate" th:value="${#dates.format(new java.util.Date(), 'yyyy-MM-dd')}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">训练时长(分钟)</label>
                        <input type="number" class="form-control" id="duration" value="60" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">备注信息</label>
                        <input type="text" class="form-control" id="notes" placeholder="训练感受...">
                    </div>
                </div>

                <!-- 训练动作 — 统一搜索面板 -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold mb-0">训练动作 <span class="text-muted small fw-normal" id="detailCount"></span></h6>
                    <div class="d-flex gap-1">
                        <button class="btn btn-outline-primary btn-sm" id="btnSearchEx" type="button">
                            <i class="bi bi-search"></i> 搜索添加
                        </button>
                        <button class="btn btn-outline-warning btn-sm" id="btnCustomEx" type="button">
                            <i class="bi bi-pencil-square"></i> 自定义
                        </button>
                    </div>
                </div>

                <div id="searchPanel" style="display:none">
                    <div class="input-group input-group-sm mb-2">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="exSearchInput" placeholder="输入关键词搜索动作库...">
                    </div>
                    <div id="exSearchResults" class="list-group list-group-flush mb-2" style="max-height:200px;overflow-y:auto"></div>
                </div>

                <div id="customPanel" class="card card-body bg-dark border-secondary p-2 mb-2" style="display:none">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <input type="text" class="form-control form-control-sm" id="customExName" placeholder="动作名称*">
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control form-control-sm" id="customExPart" placeholder="训练部位">
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control form-control-sm" id="customExCat" placeholder="分类(胸/背/肩/手臂/腿/核心)">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="customExSets" value="3" min="1" placeholder="组数">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="customExReps" value="12" min="1" placeholder="次数">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="customExWeight" value="" step="0.5" placeholder="重量(kg)">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="customExRest" value="60" min="0" placeholder="休息(s)">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-primary btn-sm w-100" onclick="addCustomEx()">
                                <i class="bi bi-check-lg"></i> 添加自定义动作
                            </button>
                        </div>
                    </div>
                </div>

                <div id="detailContainer"></div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveRecord()">保存记录</button>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-5">
    <div class="container text-center">
        <span>&copy; 2025 Fitness健身记录</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/common.js}"></script>
<script>
var recordDetails = [];
var editingRecordId = null;
var currentUserId = null;
var isGuest = false;
var exMap = {}; // exercise cache: id -> {name, category}

(function init() {
    Auth.current().then(function(user) {
        if (user) {
            currentUserId = user.id;
            var nav = document.getElementById('authNav');
            nav.innerHTML = '<li class="nav-item dropdown">' +
                '<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-check"></i> ' + (user.nickname || user.username) + '</a>' +
                '<ul class="dropdown-menu dropdown-menu-end">' +
                '<li><span class="dropdown-item-text text-muted small">' + (user.role >= 1 ? '管理员' : '普通用户') + '</span></li>' +
                '<li><hr class="dropdown-divider"></li>' +
                '<li><a class="dropdown-item" href="#" onclick="Auth.logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>' +
                '</ul></li>';
        } else {
            isGuest = true;
            GuestMode.init();
            if (GuestMode.isLocked()) { window.location.href = CTX + '/'; return; }
        }
        if (isGuest) {
            var btn = document.getElementById('btnNewRecord');
            if (btn) btn.style.display = 'none';
        }
    });

    loadRecords();
})();

// ---- 搜索/自定义面板切换 ----
function toggleSearchPanel() {
    var sp = document.getElementById('searchPanel');
    var cp = document.getElementById('customPanel');
    var btn = document.getElementById('btnSearchEx');
    var cbtn = document.getElementById('btnCustomEx');
    var open = sp.style.display !== 'block';
    sp.style.display = open ? 'block' : 'none';
    cp.style.display = 'none';
    btn.innerHTML = open ? '<i class="bi bi-x"></i> 收起搜索' : '<i class="bi bi-search"></i> 搜索添加';
    cbtn.innerHTML = '<i class="bi bi-pencil-square"></i> 自定义';
    if (open) {
        document.getElementById('exSearchInput').value = '';
        document.getElementById('exSearchResults').innerHTML = '';
        bindSearchInput();
    }
}

function toggleCustomPanel() {
    var cp = document.getElementById('customPanel');
    var sp = document.getElementById('searchPanel');
    var btn = document.getElementById('btnCustomEx');
    var sbtn = document.getElementById('btnSearchEx');
    var open = cp.style.display !== 'block';
    cp.style.display = open ? 'block' : 'none';
    sp.style.display = 'none';
    document.getElementById('exSearchResults').innerHTML = '';
    btn.innerHTML = open ? '<i class="bi bi-x"></i> 收起自定义' : '<i class="bi bi-pencil-square"></i> 自定义';
    sbtn.innerHTML = '<i class="bi bi-search"></i> 搜索添加';
}

function resetPanels() {
    document.getElementById('searchPanel').style.display = 'none';
    document.getElementById('customPanel').style.display = 'none';
    document.getElementById('exSearchInput').value = '';
    document.getElementById('exSearchResults').innerHTML = '';
    document.getElementById('btnSearchEx').innerHTML = '<i class="bi bi-search"></i> 搜索添加';
    document.getElementById('btnCustomEx').innerHTML = '<i class="bi bi-pencil-square"></i> 自定义';
}

document.getElementById('btnSearchEx').addEventListener('click', toggleSearchPanel);
document.getElementById('btnCustomEx').addEventListener('click', toggleCustomPanel);

// ---- 从动作库缓存数据 ----
async function loadExerciseCache() {
    var result = await API.get('/exercise/api/list');
    if (result.code === 200 && result.data) {
        exMap = {};
        result.data.forEach(function(ex) { exMap[ex.id] = ex; });
    }
}

// ---- 搜索 ----
var _searchTimer;
function bindSearchInput() {
    var input = document.getElementById('exSearchInput');
    if (input.dataset.bound) return;
    input.dataset.bound = '1';
    input.addEventListener('input', function() {
        clearTimeout(_searchTimer);
        var kw = this.value.trim();
        if (!kw) { document.getElementById('exSearchResults').innerHTML = ''; return; }
        _searchTimer = setTimeout(function() { searchEx(kw); }, 300);
    });
}

async function searchEx(keyword) {
    var container = document.getElementById('exSearchResults');
    var result = await API.get('/exercise/api/list?keyword=' + encodeURIComponent(keyword));
    if (result.code !== 200 || !result.data || !result.data.length) {
        container.innerHTML = '<div class="list-group-item text-muted small">未找到匹配动作</div>';
        return;
    }
    container.innerHTML = result.data.map(function(ex) {
        var cat = ex.category || '';
        return '<div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-1 px-2">' +
            '<div><small><span class="badge badge-' + catClass(cat) + ' me-1">' + cat + '</span>' + esc(ex.name) + '</small></div>' +
            '<button class="btn btn-outline-primary btn-sm py-0" onclick="addFromSearch(' + ex.id + ')"><i class="bi bi-plus"></i></button>' +
            '</div>';
    }).join('');
}

function addFromSearch(exId) {
    var ex = exMap[exId];
    if (!ex) return;
    if (recordDetails.find(function(d) { return d.exerciseId === exId; })) {
        Toast.warning('该动作已在列表中');
        return;
    }
    recordDetails.push({
        exerciseId: ex.id, exerciseName: ex.name, exerciseCategory: ex.category || '',
        bodyPart: ex.category || '', sets: 3, reps: 12, weight: null, restSeconds: 60,
        sortOrder: recordDetails.length + 1
    });
    renderDetails();
    Toast.success('已添加: ' + ex.name);
}

// ---- 自定义动作 ----
function addCustomEx() {
    var name = document.getElementById('customExName').value.trim();
    if (!name) { Toast.warning('请输入动作名称'); return; }
    recordDetails.push({
        exerciseId: null,
        exerciseName: name,
        exerciseCategory: document.getElementById('customExCat').value.trim() || document.getElementById('customExPart').value.trim(),
        bodyPart: document.getElementById('customExPart').value.trim(),
        sets: parseInt(document.getElementById('customExSets').value) || 3,
        reps: parseInt(document.getElementById('customExReps').value) || 12,
        weight: document.getElementById('customExWeight').value ? parseFloat(document.getElementById('customExWeight').value) : null,
        restSeconds: parseInt(document.getElementById('customExRest').value) || 60,
        sortOrder: recordDetails.length + 1
    });
    resetCustomForm();
    toggleCustomPanel();
    renderDetails();
    Toast.success('已添加自定义动作: ' + name);
}

function resetCustomForm() {
    document.getElementById('customExName').value = '';
    document.getElementById('customExPart').value = '';
    document.getElementById('customExCat').value = '';
    document.getElementById('customExSets').value = '3';
    document.getElementById('customExReps').value = '12';
    document.getElementById('customExWeight').value = '';
    document.getElementById('customExRest').value = '60';
}

// ---- 明细渲染 ----
function renderDetails() {
    var container = document.getElementById('detailContainer');
    document.getElementById('detailCount').textContent = recordDetails.length ? '(' + recordDetails.length + '个动作)' : '';
    if (!recordDetails.length) {
        container.innerHTML = '<p class="text-muted text-center py-3">暂无训练动作，请搜索或自定义添加</p>';
        return;
    }
    container.innerHTML = recordDetails.map(function(d, i) {
        var label = d.exerciseId
            ? '<span class="badge badge-' + catClass(d.exerciseCategory) + ' me-1">' + (d.exerciseCategory || '') + '</span>' + esc(d.exerciseName)
            : '<span class="badge bg-warning text-dark me-1">自定义</span>' + esc(d.exerciseName);
        return '<div class="detail-row">' +
            '<div class="flex-grow-1"><strong>' + label + '</strong>' +
            (d.bodyPart ? '<br><small class="text-muted">部位: ' + esc(d.bodyPart) + '</small>' : '') + '</div>' +
            '<div class="d-flex gap-2 align-items-center">' +
            '<input type="number" class="form-control form-control-sm" style="width:50px" value="' + d.sets + '" min="1"' +
            ' onchange="recordDetails[' + i + '].sets=parseInt(this.value)||3" title="组数"><span class="text-muted small">组</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:50px" value="' + d.reps + '" min="1"' +
            ' onchange="recordDetails[' + i + '].reps=parseInt(this.value)||12" title="次数"><span class="text-muted small">次</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:55px" value="' + (d.weight || '') + '" step="0.5"' +
            ' onchange="recordDetails[' + i + '].weight=this.value?parseFloat(this.value):null" title="重量(kg)"><span class="text-muted small">kg</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:45px" value="' + (d.restSeconds || '') + '" min="0"' +
            ' onchange="recordDetails[' + i + '].restSeconds=parseInt(this.value)||null" title="休息秒"><span class="text-muted small">s</span>' +
            '<button class="btn btn-outline-danger btn-sm" onclick="recordDetails.splice(' + i + ',1);renderDetails()"><i class="bi bi-x"></i></button>' +
            '</div></div>';
    }).join('');
}

// ---- 保存 ----
async function saveRecord() {
    var record = {
        trainDate: document.getElementById('trainDate').value,
        duration: parseInt(document.getElementById('duration').value) || 0,
        notes: document.getElementById('notes').value,
        details: recordDetails.filter(function(d) { return d.exerciseId || d.exerciseName; }).map(function(d) {
            return {
                exerciseId: d.exerciseId,
                exerciseName: d.exerciseName,
                setNumber: d.sets || 3,
                reps: d.reps || 12,
                weight: d.weight || null,
                sortOrder: d.sortOrder || 0
            };
        })
    };
    if (currentUserId) record.userId = currentUserId;
    if (!record.trainDate) { Toast.warning('请选择训练日期'); return; }
    if (!record.details.length) { Toast.warning('请添加至少一个训练动作'); return; }

    var result;
    if (editingRecordId) {
        record.id = editingRecordId;
        result = await API.put('/training/api/' + editingRecordId, record);
    } else {
        result = await API.post('/training/api/create', record);
    }
    if (result.code === 200) {
        Toast.success(result.message);
        bootstrap.Modal.getInstance(document.getElementById('recordModal')).hide();
        loadRecords();
    } else {
        Toast.error(result.message);
    }
}

// ---- 记录列表 ----
async function loadRecords() {
    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var url = '/training/api/list';
    var params = [];
    if (startDate) params.push('startDate=' + startDate);
    if (endDate) params.push('endDate=' + endDate);
    if (currentUserId) params.push('userId=' + currentUserId);
    if (params.length) url += '?' + params.join('&');

    var result = await API.get(url);
    var container = document.getElementById('recordList');
    var empty = document.getElementById('emptyState');
    if (result.code !== 200 || !result.data || !result.data.length) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    container.innerHTML = result.data.map(function(r) {
        var badges = (r.details || []).map(function(d) {
            return '<span class="badge bg-dark">' + (d.exerciseName || '动作') + ' ' + (d.setNumber || d.sets || 0) + '组x' + d.reps + '次' + (d.weight ? ' ' + d.weight + 'kg' : '') + '</span>';
        }).join('');
        var actions = '';
        if (!isGuest) {
            actions = '<div class="d-flex gap-1 flex-shrink-0 ms-3">' +
                (!r.isCompleted ? '<button class="btn btn-success btn-sm" onclick="completeRecord(' + r.id + ')"><i class="bi bi-check-lg"></i></button>' : '') +
                '<button class="btn btn-outline-secondary btn-sm" onclick="copyRecord(' + r.id + ')"><i class="bi bi-copy"></i></button>' +
                '<button class="btn btn-outline-secondary btn-sm" onclick="editRecord(' + r.id + ')"><i class="bi bi-pencil"></i></button>' +
                '<button class="btn btn-outline-danger btn-sm" onclick="deleteRecord(' + r.id + ')"><i class="bi bi-trash"></i></button></div>';
        }
        return '<div class="record-item' + (r.isCompleted ? ' completed' : '') + '">' +
            '<div class="d-flex justify-content-between align-items-start">' +
            '<div class="flex-grow-1">' +
            '<div class="d-flex align-items-center gap-2 mb-2">' +
            '<h5 class="mb-0">' + DateUtil.formatCN(r.trainDate) + '</h5>' +
            (r.isCompleted ? '<span class="badge bg-success">已完成</span>' : '<span class="badge bg-secondary">进行中</span>') +
            '</div>' +
            '<p class="text-muted small mb-1">时长: ' + (r.duration || 0) + '分钟 | 总组数: ' + (r.totalSets || 0) + ' | 总次数: ' + (r.totalReps || 0) + '</p>' +
            '<p class="text-muted small mb-1">' + (r.notes || '') + '</p>' +
            '<div class="d-flex flex-wrap gap-1 mt-2">' + badges + '</div>' +
            '</div>' + actions + '</div></div>';
    }).join('');
}

function clearFilter() {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
    loadRecords();
}

function openCreateModal() {
    editingRecordId = null;
    document.getElementById('modalTitle').textContent = '新增训练记录';
    document.getElementById('recordId').value = '';
    document.getElementById('trainDate').value = DateUtil.today();
    document.getElementById('duration').value = '60';
    document.getElementById('notes').value = '';
    recordDetails = [];
    resetPanels();
    loadFromLocal('trainingList', '已从动作库导入 ');
    loadFromLocal('appliedPlan', '已加载训练计划模板 ');
    renderDetails();
    loadExerciseCache();
}

function loadFromLocal(key, prefix) {
    var list = LocalStore.get(key, []);
    if (!list.length) return;
    list.forEach(function(item) {
        if (!recordDetails.find(function(d) { return d.exerciseId === item.exerciseId && item.exerciseId; })) {
            recordDetails.push({
                exerciseId: item.exerciseId,
                exerciseName: item.exerciseName,
                exerciseCategory: item.exerciseCategory || '',
                bodyPart: item.bodyPart || item.exerciseCategory || '',
                sets: item.sets || 3, reps: item.reps || 12,
                weight: item.weight || null, restSeconds: item.restSeconds || 60,
                notes: item.notes || '', sortOrder: recordDetails.length + 1
            });
        }
    });
    LocalStore.remove(key);
    Toast.success(prefix + list.length + ' 个动作');
}

async function editRecord(id) {
    var result = await API.get('/training/api/' + id);
    if (result.code !== 200) return;
    var r = result.data;
    editingRecordId = r.id;
    document.getElementById('modalTitle').textContent = '编辑训练记录';
    document.getElementById('recordId').value = r.id;
    document.getElementById('trainDate').value = r.trainDate;
    document.getElementById('duration').value = r.duration || 60;
    document.getElementById('notes').value = r.notes || '';
    recordDetails = (r.details || []).map(function(d) {
        return {
            id: d.id, exerciseId: d.exerciseId, exerciseName: d.exerciseName,
            exerciseCategory: d.exerciseCategory || '',
            bodyPart: d.exerciseCategory || '',
            sets: d.setNumber || d.sets || 3, reps: d.reps || 12,
            weight: d.weight, restSeconds: d.restSeconds || null,
            sortOrder: d.sortOrder || 0
        };
    });
    resetPanels();
    renderDetails();
    loadExerciseCache();
    new bootstrap.Modal(document.getElementById('recordModal')).show();
}

async function deleteRecord(id) {
    if (!confirm('确定删除该训练记录吗？')) return;
    var result = await API.delete('/training/api/' + id);
    if (result.code === 200) { Toast.success('删除成功'); loadRecords(); }
    else Toast.error(result.message);
}

async function completeRecord(id) {
    var result = await API.put('/training/api/' + id + '/complete');
    if (result.code === 200) { Toast.success('训练完成！'); loadRecords(); }
}

async function copyRecord(id) {
    var result = await API.post('/training/api/' + id + '/copy');
    if (result.code === 200) { Toast.success('复制成功'); loadRecords(); }
}

// ---- 工具函数 ----
function esc(text) {
    if (!text) return '';
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function catClass(cat) {
    var map = { '胸部':'chest','背部':'back','肩部':'shoulder','手臂':'arm','腿部':'leg','核心':'core' };
    return map[cat] || 'core';
}

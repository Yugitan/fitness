<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练计划 - Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-lightning-charge-fill"></i>Fitness</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">首页</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/exercise}">动作库</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/training}">训练记录</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/plan}">训练计划</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/blogger/list}">博主专区</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/statistics}">数据统计</a></li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-person-circle"></i> 登录/注册</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold mb-0">训练计划模板</h3>
        <button class="btn btn-primary" onclick="openCreatePlan()" id="btnCreatePlan">
            <i class="bi bi-plus-lg"></i> 创建计划
        </button>
    </div>

    <!-- 游客提示 -->
    <div id="guestNotice" class="card text-center p-5" style="display:none">
        <i class="bi bi-lock-fill fs-1 text-muted"></i>
        <h5 class="mt-2">请登录后查看训练计划</h5>
        <p class="text-muted">登录后可以创建、管理和套用个人训练计划</p>
        <div><a class="btn btn-primary" th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> 去登录</a></div>
    </div>

    <!-- 分组筛选 -->
    <div class="category-filter mb-3" id="groupFilter">
        <button class="filter-btn active" data-group="">全部</button>
    </div>

    <!-- 计划列表 -->
    <div class="row g-3" id="planList"></div>
    <div id="emptyState" class="card text-center p-5" style="display:none">
        <i class="bi bi-journal-text fs-1 text-muted"></i>
        <h5 class="mt-2">暂无训练计划</h5>
        <p class="text-muted">创建你的专属训练计划，一键套用开始训练！</p>
    </div>
</div>

<!-- 计划编辑弹窗 -->
<div class="modal fade" id="planModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="planModalTitle">创建训练计划</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="planId">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">计划标题</label>
                        <input type="text" class="form-control" id="planTitle" placeholder="例如: 增肌A计划">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">所属分组</label>
                        <select class="form-select" id="planGroupId"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">难度等级</label>
                        <select class="form-select" id="planDifficulty">
                            <option value="1">新手</option>
                            <option value="2">进阶</option>
                            <option value="3">高级</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">训练天数</label>
                        <input type="number" class="form-control" id="planTrainDays" value="1" min="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">目标部位</label>
                        <input type="text" class="form-control" id="planTarget" placeholder="例如: 全身">
                    </div>
                    <div class="col-12">
                        <label class="form-label">计划描述</label>
                        <textarea class="form-control" id="planDesc" rows="2" placeholder="描述该计划的特点和目标..."></textarea>
                    </div>
                </div>

                <!-- 训练内容 -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold mb-0">训练内容 <span class="text-muted small fw-normal" id="detailCount"></span></h6>
                    <div class="d-flex gap-1">
                        <button class="btn btn-outline-primary btn-sm" id="btnSearchPlan" type="button">
                            <i class="bi bi-search"></i> 搜索动作
                        </button>
                        <button class="btn btn-outline-warning btn-sm" id="btnCustomPlan" type="button">
                            <i class="bi bi-pencil-square"></i> 自定义动作
                        </button>
                    </div>
                </div>

                <!-- 搜索面板 -->
                <div id="planSearchPanel" style="display:none">
                    <div class="input-group input-group-sm mb-2">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="planSearchInput" placeholder="输入关键词搜索动作库...">
                    </div>
                    <div id="planSearchResults" class="list-group list-group-flush mb-2" style="max-height:200px;overflow-y:auto"></div>
                </div>

                <!-- 自定义动作表单 -->
                <div id="planCustomForm" class="card card-body bg-dark border-secondary p-2 mb-2" style="display:none">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <input type="text" class="form-control form-control-sm" id="planCustomName" placeholder="动作名称*">
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control form-control-sm" id="planCustomPart" placeholder="训练部位">
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control form-control-sm" id="planCustomCat" placeholder="分类(胸/背/肩/手臂/腿/核心)">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="planCustomSets" value="3" min="1" placeholder="组数">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="planCustomReps" value="12" min="1" placeholder="次数">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="planCustomWeight" value="" step="0.5" placeholder="重量(kg)">
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control form-control-sm" id="planCustomRest" value="60" min="0" placeholder="休息(s)">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-primary btn-sm w-100" onclick="addPlanCustomEx()">
                                <i class="bi bi-check-lg"></i> 添加自定义动作
                            </button>
                        </div>
                    </div>
                </div>

                <div id="planDetailContainer"></div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="savePlan()">保存计划</button>
            </div>
        </div>
    </div>
</div>

<footer class="footer mt-5">
    <div class="container text-center">
        <span>&copy; 2025 Fitness健身记录</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/common.js}"></script>
<script>
var plans = [];
var groups = [];
var planDetails = [];
var editingPlanId = null;
var currentUserId = null;
var isGuest = false;

// ---- 初始化 ----
(function init() {
    Auth.current().then(function(user) {
        if (user) {
            currentUserId = user.id;
            var nav = document.getElementById('authNav');
            nav.innerHTML = '<li class="nav-item dropdown">' +
                '<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-check"></i> ' + (user.nickname || user.username) + '</a>' +
                '<ul class="dropdown-menu dropdown-menu-end">' +
                '<li><span class="dropdown-item-text text-muted small">' + (user.role >= 1 ? '管理员' : '普通用户') + '</span></li>' +
                '<li><hr class="dropdown-divider"></li>' +
                '<li><a class="dropdown-item" href="#" onclick="Auth.logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>' +
                '</ul></li>';
        } else {
            isGuest = true;
            GuestMode.init();
            if (GuestMode.isLocked()) { window.location.href = CTX + '/'; return; }
        }

        if (isGuest) {
            document.getElementById('btnCreatePlan').style.display = 'none';
            document.getElementById('groupFilter').style.display = 'none';
            document.getElementById('guestNotice').style.display = 'block';
            document.getElementById('planList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'none';
            return;
        }

        loadGroups();
        loadPlans();
    });
})();

// ---- 分组 ----
async function loadGroups() {
    var url = '/plan/api/groups';
    if (currentUserId) url += '?userId=' + currentUserId;
    var result = await API.get(url);
    if (result.code === 200) {
        groups = result.data || [];
        renderGroupFilter();
        updatePlanGroupSelect();
    }
}

function renderGroupFilter() {
    var container = document.getElementById('groupFilter');
    container.innerHTML = '<button class="filter-btn active" data-group="">全部</button>' +
        groups.map(function(g) { return '<button class="filter-btn" data-group="' + g.id + '">' + esc(g.name) + '</button>'; }).join('');
}

function updatePlanGroupSelect() {
    var select = document.getElementById('planGroupId');
    select.innerHTML = groups.map(function(g) { return '<option value="' + g.id + '">' + esc(g.name) + '</option>'; }).join('');
}

document.getElementById('groupFilter').addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    this.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    filterPlans(e.target.dataset.group);
});

function filterPlans(groupId) {
    var container = document.getElementById('planList');
    var empty = document.getElementById('emptyState');
    var filtered = groupId ? plans.filter(function(p) { return p.groupId == groupId; }) : plans;
    if (!filtered.length) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    renderPlanCards(filtered);
}

// ---- 计划列表 ----
async function loadPlans() {
    var url = '/plan/api/list';
    var params = [];
    if (currentUserId) params.push('userId=' + currentUserId);
    if (params.length) url += '?' + params.join('&');
    var result = await API.get(url);
    if (result.code === 200) {
        plans = result.data || [];
        renderPlanCards(plans);
        if (!plans.length) document.getElementById('emptyState').style.display = 'block';
    }
}

function renderPlanCards(list) {
    var container = document.getElementById('planList');
    container.innerHTML = list.map(function(p) {
        var badges = (p.details || []).slice(0, 4).map(function(d) {
            return '<span class="badge bg-dark">' + esc(d.exerciseName) + '</span>';
        }).join('');
        var more = (p.details || []).length > 4 ? '<span class="badge bg-secondary">+' + (p.details.length - 4) + '个</span>' : '';
        var diffBadge = p.difficultyLevel == 1 ? 'bg-success' : (p.difficultyLevel == 2 ? 'bg-warning' : 'bg-danger');
        var diffText = p.difficultyLevel == 1 ? '新手' : (p.difficultyLevel == 2 ? '进阶' : '高级');
        return '<div class="col-md-6 col-lg-4">' +
            '<div class="card h-100">' +
            '<div class="card-body">' +
            '<div class="d-flex justify-content-between align-items-start mb-2">' +
            '<h5 class="fw-bold mb-0">' + esc(p.title) + '</h5>' +
            '<span class="badge ' + diffBadge + '">' + diffText + '</span></div>' +
            '<p class="text-muted small">' + (p.groupName || '未分组') + ' | ' + p.trainDays + '天 | ' + (p.targetBodyPart || '全身') + '</p>' +
            '<p class="text-muted small">' + esc(p.description || '') + '</p>' +
            '<div class="d-flex gap-1 flex-wrap mt-2">' + badges + more + '</div></div>' +
            '<div class="card-footer bg-transparent border-top-0">' +
            '<div class="d-flex gap-1">' +
            '<button class="btn btn-primary btn-sm flex-grow-1" onclick="applyPlan(' + p.id + ')"><i class="bi bi-play-fill"></i> 套用模板</button>' +
            '<button class="btn btn-outline-secondary btn-sm" onclick="editPlan(' + p.id + ')"><i class="bi bi-pencil"></i></button>' +
            '<button class="btn btn-outline-secondary btn-sm" onclick="copyPlan(' + p.id + ')"><i class="bi bi-copy"></i></button>' +
            '<button class="btn btn-outline-danger btn-sm" onclick="deletePlan(' + p.id + ')"><i class="bi bi-trash"></i></button>' +
            '</div></div></div></div>';
    }).join('');
}

// ---- 搜索/自定义面板切换 ----
function togglePlanSearch() {
    var sp = document.getElementById('planSearchPanel');
    var cp = document.getElementById('planCustomForm');
    var btn = document.getElementById('btnSearchPlan');
    var cbtn = document.getElementById('btnCustomPlan');
    var open = sp.style.display !== 'block';
    sp.style.display = open ? 'block' : 'none';
    cp.style.display = 'none';
    btn.innerHTML = open ? '<i class="bi bi-x"></i> 收起搜索' : '<i class="bi bi-search"></i> 搜索动作';
    cbtn.innerHTML = '<i class="bi bi-pencil-square"></i> 自定义动作';
    if (open) {
        document.getElementById('planSearchInput').value = '';
        document.getElementById('planSearchResults').innerHTML = '';
        bindPlanSearch();
    }
}

function togglePlanCustom() {
    var cp = document.getElementById('planCustomForm');
    var sp = document.getElementById('planSearchPanel');
    var btn = document.getElementById('btnCustomPlan');
    var sbtn = document.getElementById('btnSearchPlan');
    var open = cp.style.display !== 'block';
    cp.style.display = open ? 'block' : 'none';
    sp.style.display = 'none';
    document.getElementById('planSearchResults').innerHTML = '';
    btn.innerHTML = open ? '<i class="bi bi-x"></i> 收起自定义' : '<i class="bi bi-pencil-square"></i> 自定义动作';
    sbtn.innerHTML = '<i class="bi bi-search"></i> 搜索动作';
}

function resetPlanPanels() {
    document.getElementById('planSearchPanel').style.display = 'none';
    document.getElementById('planCustomForm').style.display = 'none';
    document.getElementById('planSearchInput').value = '';
    document.getElementById('planSearchResults').innerHTML = '';
    document.getElementById('btnSearchPlan').innerHTML = '<i class="bi bi-search"></i> 搜索动作';
    document.getElementById('btnCustomPlan').innerHTML = '<i class="bi bi-pencil-square"></i> 自定义动作';
    resetPlanCustomForm();
}

document.getElementById('btnSearchPlan').addEventListener('click', togglePlanSearch);
document.getElementById('btnCustomPlan').addEventListener('click', togglePlanCustom);

// ---- 搜索 ----
var _planSearchTimer;
function bindPlanSearch() {
    var input = document.getElementById('planSearchInput');
    if (input.dataset.bound) return;
    input.dataset.bound = '1';
    input.addEventListener('input', function() {
        clearTimeout(_planSearchTimer);
        var kw = this.value.trim();
        if (!kw) { document.getElementById('planSearchResults').innerHTML = ''; return; }
        _planSearchTimer = setTimeout(function() { planSearch(kw); }, 300);
    });
}

async function planSearch(keyword) {
    var container = document.getElementById('planSearchResults');
    var result = await API.get('/exercise/api/list?keyword=' + encodeURIComponent(keyword));
    if (result.code !== 200 || !result.data || !result.data.length) {
        container.innerHTML = '<div class="list-group-item text-muted small">未找到匹配动作</div>';
        return;
    }
    container.innerHTML = result.data.map(function(ex) {
        var cat = ex.category || '';
        return '<div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-1 px-2">' +
            '<div><small><span class="badge badge-' + catClass(cat) + ' me-1">' + cat + '</span>' + esc(ex.name) + '</small></div>' +
            '<button class="btn btn-outline-primary btn-sm py-0" onclick="addPlanSearchEx(' + ex.id + ', \'' + esc(ex.name).replace(/'/g, "\\'") + '\', \'' + (ex.category || '').replace(/'/g, "\\'") + '\')"><i class="bi bi-plus"></i></button>' +
            '</div>';
    }).join('');
}

function addPlanSearchEx(exId, name, category) {
    if (planDetails.find(function(d) { return d.exerciseId === exId; })) {
        Toast.warning('该动作已在计划中');
        return;
    }
    planDetails.push({
        exerciseId: exId, exerciseName: name, exerciseCategory: category,
        dayNumber: 1, sets: 3, reps: 12, weight: null, restSeconds: 60,
        notes: '', sortOrder: planDetails.length + 1
    });
    renderPlanDetails();
    Toast.success('已添加: ' + name);
}

// ---- 自定义动作 ----
function addPlanCustomEx() {
    var name = document.getElementById('planCustomName').value.trim();
    if (!name) { Toast.warning('请输入动作名称'); return; }
    var part = document.getElementById('planCustomPart').value.trim();
    var cat = document.getElementById('planCustomCat').value.trim();
    planDetails.push({
        exerciseId: null,
        exerciseName: name,
        exerciseCategory: cat || part,
        bodyPart: part,
        dayNumber: 1,
        sets: parseInt(document.getElementById('planCustomSets').value) || 3,
        reps: parseInt(document.getElementById('planCustomReps').value) || 12,
        weight: document.getElementById('planCustomWeight').value ? parseFloat(document.getElementById('planCustomWeight').value) : null,
        restSeconds: parseInt(document.getElementById('planCustomRest').value) || 60,
        notes: part ? ('目标部位: ' + part) : '',
        sortOrder: planDetails.length + 1
    });
    resetPlanCustomForm();
    togglePlanCustom();
    renderPlanDetails();
    Toast.success('已添加自定义动作: ' + name);
}

function resetPlanCustomForm() {
    document.getElementById('planCustomName').value = '';
    document.getElementById('planCustomPart').value = '';
    document.getElementById('planCustomCat').value = '';
    document.getElementById('planCustomSets').value = '3';
    document.getElementById('planCustomReps').value = '12';
    document.getElementById('planCustomWeight').value = '';
    document.getElementById('planCustomRest').value = '60';
}

// ---- 明细渲染 ----
function renderPlanDetails() {
    var container = document.getElementById('planDetailContainer');
    document.getElementById('detailCount').textContent = planDetails.length ? '(' + planDetails.length + '个动作)' : '';
    if (!planDetails.length) {
        container.innerHTML = '<p class="text-muted text-center py-3">暂无训练内容，请搜索或自定义添加动作</p>';
        return;
    }
    container.innerHTML = planDetails.map(function(d, i) {
        var label = d.exerciseId
            ? '<span class="badge badge-' + catClass(d.exerciseCategory) + ' me-1">' + (d.exerciseCategory || '') + '</span>' + esc(d.exerciseName)
            : '<span class="badge bg-warning text-dark me-1">自定义</span>' + esc(d.exerciseName);
        return '<div class="detail-row">' +
            '<div class="flex-grow-1"><strong>' + label + '</strong>' +
            (d.notes ? '<br><small class="text-muted">' + esc(d.notes) + '</small>' : '') + '</div>' +
            '<div class="d-flex gap-2 align-items-center">' +
            '<input type="number" class="form-control form-control-sm" style="width:50px" value="' + d.sets + '" min="1"' +
            ' onchange="planDetails[' + i + '].sets=parseInt(this.value)||3" title="组数"><span class="text-muted small">组</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:50px" value="' + d.reps + '" min="1"' +
            ' onchange="planDetails[' + i + '].reps=parseInt(this.value)||12" title="次数"><span class="text-muted small">次</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:55px" value="' + (d.weight || '') + '" step="0.5"' +
            ' onchange="planDetails[' + i + '].weight=this.value?parseFloat(this.value):null" title="重量(kg)"><span class="text-muted small">kg</span>' +
            '<input type="number" class="form-control form-control-sm" style="width:45px" value="' + (d.restSeconds || 60) + '" min="0"' +
            ' onchange="planDetails[' + i + '].restSeconds=parseInt(this.value)||60" title="休息秒"><span class="text-muted small">s</span>' +
            '<button class="btn btn-outline-danger btn-sm" onclick="planDetails.splice(' + i + ',1);renderPlanDetails()"><i class="bi bi-x"></i></button>' +
            '</div></div>';
    }).join('');
}

// ---- CRUD ----
function openCreatePlan() {
    editingPlanId = null;
    document.getElementById('planModalTitle').textContent = '创建训练计划';
    document.getElementById('planId').value = '';
    document.getElementById('planTitle').value = '';
    document.getElementById('planDifficulty').value = '1';
    document.getElementById('planTrainDays').value = '1';
    document.getElementById('planTarget').value = '';
    document.getElementById('planDesc').value = '';
    planDetails = [];
    resetPlanPanels();
    renderPlanDetails();
    new bootstrap.Modal(document.getElementById('planModal')).show();
}

async function editPlan(id) {
    var result = await API.get('/plan/api/' + id);
    if (result.code !== 200) return;
    var p = result.data;
    editingPlanId = p.id;
    document.getElementById('planModalTitle').textContent = '编辑训练计划';
    document.getElementById('planId').value = p.id;
    document.getElementById('planTitle').value = p.title;
    document.getElementById('planDifficulty').value = p.difficultyLevel;
    document.getElementById('planTrainDays').value = p.trainDays;
    document.getElementById('planTarget').value = p.targetBodyPart || '';
    document.getElementById('planDesc').value = p.description || '';
    document.getElementById('planGroupId').value = p.groupId || '';
    planDetails = (p.details || []).map(function(d) {
        return {
            id: d.id, exerciseId: d.exerciseId, exerciseName: d.exerciseName,
            exerciseCategory: d.exerciseCategory || '',
            bodyPart: d.bodyPart || d.exerciseCategory || '',
            dayNumber: d.dayNumber || 1, sets: d.sets || 3, reps: d.reps || 12,
            weight: d.weight, restSeconds: d.restSeconds || 60,
            notes: d.notes || '', sortOrder: d.sortOrder || 0
        };
    });
    resetPlanPanels();
    renderPlanDetails();
    new bootstrap.Modal(document.getElementById('planModal')).show();
}

async function savePlan() {
    var plan = {
        title: document.getElementById('planTitle').value,
        groupId: document.getElementById('planGroupId').value || null,
        difficultyLevel: parseInt(document.getElementById('planDifficulty').value),
        trainDays: parseInt(document.getElementById('planTrainDays').value),
        targetBodyPart: document.getElementById('planTarget').value,
        description: document.getElementById('planDesc').value,
        details: planDetails.filter(function(d) { return d.exerciseId || d.exerciseName; })
    };
    if (!plan.title) { Toast.warning('请输入计划标题'); return; }

    var result;
    if (editingPlanId) {
        result = await API.put('/plan/api/' + editingPlanId, plan);
    } else {
        result = await API.post('/plan/api/create', plan);
    }
    if (result.code === 200) {
        Toast.success(result.message);
        bootstrap.Modal.getInstance(document.getElementById('planModal')).hide();
        loadPlans();
    } else {
        Toast.error(result.message);
    }
}

async function deletePlan(id) {
    if (!confirm('确定删除该训练计划吗？')) return;
    var result = await API.delete('/plan/api/' + id);
    if (result.code === 200) { Toast.success('删除成功'); loadPlans(); }
    else Toast.error(result.message);
}

async function copyPlan(id) {
    var result = await API.post('/plan/api/' + id + '/copy');
    if (result.code === 200) { Toast.success('复制成功'); loadPlans(); }
    else Toast.error(result.message);
}

// ---- 套用模板 ----
async function applyPlan(id) {
    var result = await API.get('/plan/api/' + id + '/apply');
    if (result.code !== 200) return;
    var plan = result.data;
    LocalStore.set('appliedPlan', (plan.details || []).map(function(d) {
        return {
            exerciseId: d.exerciseId, exerciseName: d.exerciseName,
            exerciseCategory: d.exerciseCategory || '',
            bodyPart: d.bodyPart || d.exerciseCategory || '',
            sets: d.sets || 3, reps: d.reps || 12,
            weight: d.weight || null, restSeconds: d.restSeconds || 60,
            notes: d.notes || ''
        };
    }));
    Toast.success('模板已加载，即将跳转到训练记录');
    window.location.href = CTX + '/training';
}

// ---- 工具 ----
function esc(text) {
    if (!text) return '';
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function catClass(cat) {
    var map = { '胸部': 'chest', '背部': 'back', '肩部': 'shoulder', '手臂': 'arm', '腿部': 'leg', '核心': 'core' };
    return map[cat] || 'core';
}
